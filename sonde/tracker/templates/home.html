{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="{% static 'tracker/ballon.png' %}" type="image/png">
<link rel="manifest" href="{% static 'tracker/manifest.json' %}">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="{% static 'global/base.css' %}">
<title>KTM-sonde</title>

<style>
#container {
    display: flex;
    height: calc(100vh - 45px);
}

#table {
    width: 23%;
    overflow-y: auto;
    border-right: 1px solid #ccc;
    padding: 6px;
    background: #f8f8f8;
}

/* MAP */
#map {
    width: 77%;
    overflow: hidden;
}

/* GROUP TABLES */
.group {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 10px;
    background: white;
}

.group th, .group td {
    border: 1px solid #ccc;
    padding: 6px;
    font-size: 12px;
    text-align: center;
}

.group th {
    background: #f0f0f0;
}

#kmlbutton {
    display: block;
    background: #3f3e3e;
    color: white;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
}
#skewtbutton {
    background: #3f3e3e;
    color: white;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
}




#hodobutton {
    background: #3f3e3e;
    color: white;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
}

@media (max-width: 768px) {
    #container {
        flex-direction: column;
        height: auto;
        overflow-y: auto;
    }

    #map {
        width: 100%;
        height: 50vh;
        order: 1;
    }

    #table {
        width: 100%;
        height: auto;
        overflow-y: visible;
        order: 2;
        border-right: none;
        border-top: 1px solid #ccc;
    }
}




.status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-left: 8px;
    border-radius: 50%;
    background: green;
    position: relative;
}

/* pulse animation */
.status-dot::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 1.5s infinite;
    opacity: 0.6;
}

@keyframes pulse {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
    }
    100% {
        transform: translate(-50%, -50%) scale(3);
        opacity: 0;
    }
}

.status-green::after,
.status-green {
    background: #2ecc71;
}

.status-red::after,
.status-red {
    background: #e74c3c;
}

#g1_id { position: relative; }
#g1_id:hover { text-decoration: underline; }


</style>
</head>

<body>
    {% include "navbar.html" with active="home" %}

<div id="container">

    <!-- LEFT SIDEBAR -->
    <div id="table">

        <!-- GROUP 1 -->
        <table class="group">
            <tr>
                <th>Sonde ID</th>
                <th>Type</th>
                <th>Subtype</th>
            </tr>
            <tr>
                <td id="g1_id" onclick="copySondeId()" style="cursor:pointer;font-weight:bold;" title="Click to copy share link"></td>
                <td id="g1_type"></td>
                <td id="g1_subtype"></td>
            </tr>
        </table>
        <div id="copyToast" style="display:none;text-align:center;font-size:11px;color:#060;padding:2px 0;">Link copied!</div>

        <!-- GROUP 2 -->
        <table class="group">
            <tr>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Altitude</th>
            </tr>
            <tr>
                <td id="g2_lat"></td>
                <td id="g2_lon"></td>
                <td id="g2_alt"></td>
            </tr>
        </table>

        <!-- GROUP 3 -->
        <table class="group">
            <tr>
                <th>Time</th>
            </tr>
            <tr>
                <td id="g3_time"></td>
            </tr>
        </table>

        <!-- GROUP 4 -->
        <table class="group">
            <tr>
                <th>Horizontal Vel</th>
                <th>Vertical Vel</th>
                <th>Heading</th>
            </tr>
            <tr>
                <td id="g4_h"></td>
                <td id="g4_v"></td>
                <td id="g4_head"></td>
            </tr>
        </table>

        <!-- GROUP 5 -->
        <table class="group">
            <tr>
                <th>Temp</th>
                <th>Humidity</th>
                <th>Pressure</th>
            </tr>
            <tr>
                <td id="g5_temp"></td>
                <td id="g5_hum"></td>
                <td id="g5_pres"></td>
            </tr>
        </table>

        <!-- GROUP 6 -->
        <table class="group">
            <tr>
                <th>Battery</th>
                <th>Freq</th>
                <th>SNR</th>
            </tr>
            <tr>
                <td id="g6_bat"></td>
                <td id="g6_freq"></td>
                <td id="g6_snr"></td>
            </tr>
        </table>

        <canvas id="tempChart"></canvas>
        <canvas id="humChart"></canvas>
        <canvas id="altChart"></canvas>
        <canvas id="velChart"></canvas>
        <canvas id="snrChart"></canvas>

        <div style="display:flex; gap:6px; justify-content:center; margin:10px 6px;">
            <button onclick="downloadKML()" id="kmlbutton">Download KML</button>
            <button onclick="skewTplot()" id="skewtbutton">Skew-T</button>
            <button onclick="hodographPlot()" id="hodobutton">Hodograph</button>
        </div>

        <div id="skewtDiv" style="display:none; padding:6px;">
            <img id="skewtImg" style="width:100%;">
        </div>

        <div id="hodoDiv" style="display:none; padding:6px;">
            <img id="hodoImg" style="width:100%;">
        </div>

    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([27.682, 85.2881], 13);

let baseMaps = {
    "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }),
    "Topo": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap' }),
    "Dark": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }),
    "Light": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }),
    "Esri Topo": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }),
    "Esri Street": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' }),
};

baseMaps["Satellite"].addTo(map); // THEN add to map

L.control.layers(baseMaps, null, { position: 'bottomright' }).addTo(map);

let legend = L.control({ position: 'topright' });

legend.onAdd = function () {
    let div = L.DomUtil.create('div');
    div.style.cssText = `
        padding: 8px 12px;
       
        font-size: 13px;
        line-height: 24px;
        margin-bottom: 30px;
    `;
    div.innerHTML = `
    <div><span style="display:inline-block;width:30px;height:3px;background:red;vertical-align:middle;margin-right:6px;"></span><span style="color:white;">Actual</span></div>
    <div><span style="display:inline-block;width:30px;height:3px;background:blue;vertical-align:middle;margin-right:6px;"></span><span style="color:white;">Predicted</span></div>
`;
    return div;
};

legend.addTo(map);


let infoBox = L.control({ position: 'bottomleft' });

infoBox.onAdd = function () {
    let div = L.DomUtil.create('div');
    div.style.cssText = `
        font-size: 12px;
        line-height: 20px;
        color: white;
        padding: 6px 10px;
    `;
    div.id = 'infoBox';
    return div;
};

infoBox.addTo(map);


let balloonIcon = L.icon({
    iconUrl: "{% static 'tracker/ballon.png' %}",
    iconSize: [40, 40],
    iconAnchor: [20, 40],
});

let pballoonIcon = L.icon({
    iconUrl: "{% static 'tracker/pballon.png' %}",
    iconSize: [40, 40],
    iconAnchor: [20, 40],
});

let ascentIcon = L.icon({
    iconUrl: "{% static 'tracker/blast.png' %}",
    iconSize: [30, 30],
    iconAnchor: [10, 10],
});

let stationIcon = L.icon({
    iconUrl: "{% static 'tracker/station.png' %}",
    iconSize: [40, 40],
    iconAnchor: [20, 40],
});

station = L.marker([27.682, 85.2881], { icon: stationIcon }).addTo(map)
station.bindPopup(`
    <b>Upper Air Radiosonde Station</b><br>
    Lat, Lon: 27.682, 85.2881
`, {
    closeButton: false,
    offset: [0, -20]
});


let marker = null;
let pathData = [];
let polyline = L.polyline([], { color: 'red' }).addTo(map)
let pred_polyline = L.polyline([], { color: 'blue' }).addTo(map)
let predictionLoaded = false

const tempCtx = document.getElementById('tempChart').getContext('2d');
const humCtx = document.getElementById('humChart').getContext('2d');
const altCtx = document.getElementById('altChart').getContext('2d');
const velCtx = document.getElementById('velChart').getContext('2d');
const snrCtx = document.getElementById('snrChart').getContext('2d');

const allCharts = [];

function syncHighlight(source, index) {
    allCharts.forEach(c => {
        const meta = c.getDatasetMeta(0);
        if (c === source) {
            c.setActiveElements([{ datasetIndex: 0, index }]);
            c.tooltip.setActiveElements([{ datasetIndex: 0, index }]);
        } else {
            c.setActiveElements([{ datasetIndex: 0, index }]);
            c.tooltip.setActiveElements([]);
        }
        c.update('none');
    });
}

function clearAll() {
    allCharts.forEach(c => {
        c.setActiveElements([]);
        c.tooltip.setActiveElements([]);
        c.update('none');
    });
}

const sharedOptions = (label, showX = false) => ({
    responsive: true,
    animation: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
        legend: { display: false },
        tooltip: {
            enabled: true,
            callbacks: {
                title: (items) => items.length ? items[0].label : ''
            }
        }
    },
    scales: {
        x: { display: false },
        y: { beginAtZero: false }
    },
    onHover: (evt, elements) => {
        if (elements.length > 0) {
            syncHighlight(evt.chart, elements[0].index);
        } else {
            clearAll();
        }
    }
});

let tempChart = new Chart(tempCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Temperature (°C)',
        data: [],
        borderColor: 'blue',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.2
    }]},
    options: sharedOptions('Temperature')
});
allCharts.push(tempChart);

let humChart = new Chart(humCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Humidity (%)',
        data: [],
        borderColor: 'red',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.2
    }]},
    options: sharedOptions('Humidity')
});
allCharts.push(humChart);

let altChart = new Chart(altCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Altitude (m)',
        data: [],
        borderColor: 'green',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.2
    }]},
    options: sharedOptions('Altitude')
});
allCharts.push(altChart);

let velChart = new Chart(velCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'Vertical Vel (m/s)',
        data: [],
        borderColor: '#8B00FF',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.2
    }]},
    options: sharedOptions('Vertical Vel')
});
allCharts.push(velChart);

let snrChart = new Chart(snrCtx, {
    type: 'line',
    data: { labels: [], datasets: [{
        label: 'SNR (dB)',
        data: [],
        borderColor: 'black',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.2
    }]},
    options: sharedOptions('SNR', true)
});
allCharts.push(snrChart);



/* FETCH */
async function fetch_Sondes() {
    const params = new URLSearchParams(window.location.search);
    const sid = params.get('sonde_id');
    const url = sid ? '{{ API_SONDES_URL }}?sonde_id=' + encodeURIComponent(sid) : '{{ API_SONDES_URL }}';
    let res = await fetch(url);
    return await res.json();
}

/* UPDATE */
async function updatePath() {
    let sondes = await fetch_Sondes();

    if (!sondes.data.length) return;

    let s = sondes.data[0];

    let coords = sondes.data.map(p => [p.lat, p.lon]);
    polyline.setLatLngs(coords);

    let latest = coords[0];
    pathData = sondes.data;

    if (!predictionLoaded) {
        predictionLoaded = true;
        await predicted_path(sondes.sonde_id);
    }

    /* MARKER */
    if (!marker) {
        marker = L.marker(latest, { icon: balloonIcon }).addTo(map);
    } else {
        marker.setLatLng(latest);
    }

    /* TIME */
    let d = new Date(s.datetime);
    let time = d.toLocaleString('en-GB', { hour12: false });

    /* GROUP 1 */
    document.getElementById("g1_id").innerText = sondes.sonde_id;
    document.getElementById("g1_type").innerText = sondes.type;
    document.getElementById("g1_subtype").innerText = sondes.subtype;

    /* GROUP 2 */
    document.getElementById("g2_lat").innerText = s.lat;
    document.getElementById("g2_lon").innerText = s.lon;
    document.getElementById("g2_alt").innerText = s.alt + " m";

    /* GROUP 3 */
    document.getElementById("g3_time").innerText = time + ' NPT';

    /* GROUP 4 */
    document.getElementById("g4_h").innerText = s.vel_h.toFixed(2) + " m/s";
    document.getElementById("g4_v").innerText = s.vel_v.toFixed(2) + " m/s";
    document.getElementById("g4_head").innerText = s.heading.toFixed(2) + "°";

    /* GROUP 5 */
    document.getElementById("g5_temp").innerText = s.temp + " °C";
    document.getElementById("g5_hum").innerText = s.humidity + " %";
    document.getElementById("g5_pres").innerText = s.pressure + " hPa";

    /* GROUP 6 */
    document.getElementById("g6_bat").innerText = s.battery + " V";
    document.getElementById("g6_freq").innerText = s.f_centre + " Hz";
    document.getElementById("g6_snr").innerText = s.snr + " dB";
    
    let data = sondes.data.slice().reverse();

    let temps = data.map(t => t.temp);
    let hums = data.map(t => t.humidity);
    let alts = data.map(t => t.alt);
    let vels = data.map(t => t.vel_v);
    let snrs = data.map(t => t.snr);
    let labels = data.map(t => new Date(t.datetime).toLocaleTimeString());

    tempChart.data.labels = labels;
    tempChart.data.datasets[0].data = temps;
    tempChart.update();

    humChart.data.labels = labels;
    humChart.data.datasets[0].data = hums;
    humChart.update();

    altChart.data.labels = labels;
    altChart.data.datasets[0].data = alts;
    altChart.update();

    velChart.data.labels = labels;
    velChart.data.datasets[0].data = vels;
    velChart.update();

    snrChart.data.labels = labels;
    snrChart.data.datasets[0].data = snrs;
    snrChart.update();
    updateStatus(s.datetime);

    

    /* POPUP */
    marker.bindPopup(`
        <b>${sondes.sonde_id}</b><br>
        Alt: ${s.alt} m <br>
        Lat, Lon: ${s.lat},${s.lon}
    `, {
    closeButton: false,
    offset: [0, -20]

}
      
);


marker.on('mouseover', function () {
    this.openPopup();
});

// Hide when mouse leaves
marker.on('mouseout', function () {
    this.closePopup();
});
}

async function skewTplot() {
    const res = await fetch_Sondes();
    const sonde_id = res.sonde_id;
    
    const div = document.getElementById('skewtDiv');
    const img = document.getElementById('skewtImg');
    
    img.src = `{{ DATA_SKEW_T_URL }}?sonde_id=${sonde_id}`;
    
    // toggle show/hide
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
}



async function hodographPlot() {
    const res = await fetch_Sondes();
    const sonde_id = res.sonde_id;

    const div = document.getElementById('hodoDiv');
    const img = document.getElementById('hodoImg');

    img.src = `{{ DATA_HODO_URL }}?sonde_id=${sonde_id}`;

    div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

async function downloadKML(){
    const res= await fetch_Sondes()

    let coords=''
    res.data.forEach(p => {
        coords+=`${p.lon},${p.lat},${p.alt}\n`
    })
    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>

<name>Sonde Path</name>

<Placemark>
  <name>Flight Path</name>

  <Style>
    <LineStyle>
      <color>ff0000ff</color> 
      <width>2</width>
    </LineStyle>
    <PolyStyle>
      <color>4d0000ff</color>  
    </PolyStyle>
  </Style>

  <LineString>
    <extrude>1</extrude> 
    <altitudeMode>absolute</altitudeMode>
    <coordinates>
${coords}
    </coordinates>
  </LineString>

</Placemark>

</Document>
</kml>`;

    const blob = new Blob([kml], { type: "application/vnd.google-earth.kml+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "sonde_path.kml";
    a.click();

    URL.revokeObjectURL(url);
}


station.on('mouseover', function () {
    this.openPopup();
});

// Hide when mouse leaves
station.on('mouseout', function () {
    this.closePopup();
});

let popup = L.popup({
    closeButton: false,
    offset: [0, -10]
});

let lastMove = 0;

polyline.on('mousemove', function (e) {
    let now = Date.now();
    if (now - lastMove < 50) return; // throttle
    lastMove = now;

    if (!pathData.length) return;

    let minDist = Infinity;
    let closest = null;

    for (let i = 0; i < pathData.length; i++) {
        let d = map.distance(e.latlng, [pathData[i].lat, pathData[i].lon]);
        if (d < minDist) {
            minDist = d;
            closest = pathData[i];
        }
    }

    if (!closest) return;

    popup
        .setLatLng(e.latlng)
        .setContent(`
            <b>Telemetry</b><br>
            Alt: ${closest.alt} m<br>
            Temp: ${closest.temp} °C<br>
            Hum: ${closest.humidity} %
        `)
        .openOn(map);
});

polyline.on('mouseout', function () {
    map.closePopup();
});


function updateStatus(latestTime) {
    const dot = document.getElementById("statusDot");
    if (!dot || !latestTime) return;

    const last = new Date(latestTime);
    const now = new Date();

    const diffHours = (now - last) / (1000 * 60 * 60);

    if (diffHours > 6) {
        dot.classList.remove("status-green");
        dot.classList.add("status-red");
    } else {
        dot.classList.remove("status-red");
        dot.classList.add("status-green");
    }
}


async function predicted_path(sonde_id) {
    const res = await fetch(`{{ API_PRED_URL }}?sonde_id=${sonde_id}`)
    const raw = await res.json()

    if (!raw.data || !raw.data.prediction) {
        predictionLoaded = false;
        return;
    }

    const prediction = raw.data.prediction;

    const ascent = prediction[0].trajectory.map(p => [p.latitude, p.longitude]);
    const descent = prediction[1].trajectory.map(p => [p.latitude, p.longitude]);

    pred_polyline.setLatLngs([...ascent, ...descent]);

    // landing marker
    const lastPoint = prediction[1].trajectory.at(-1);
    const landingMarker = L.marker([lastPoint.latitude, lastPoint.longitude], { icon: pballoonIcon }).addTo(map);
    landingMarker.bindPopup(`
        <b>Predicted Landing</b><br>
        Lat: ${lastPoint.latitude.toFixed(4)}, Lon: ${lastPoint.longitude.toFixed(4)}<br>
        Alt: ${lastPoint.altitude.toFixed(0)} m
    `, { closeButton: false, offset: [0, -20] });
    landingMarker.on('mouseover', function () { this.openPopup(); });
    landingMarker.on('mouseout', function () { this.closePopup(); });

    // burst marker
    const burstPoint = prediction[0].trajectory.at(-1);
    const burstMarker = L.marker([burstPoint.latitude, burstPoint.longitude], { icon: ascentIcon }).addTo(map);
    burstMarker.bindPopup(`
        <b>Predicted Burst</b><br>
        Lat: ${burstPoint.latitude.toFixed(4)}, Lon: ${burstPoint.longitude.toFixed(4)}<br>
        Alt: ${burstPoint.altitude.toFixed(0)} m
    `, { closeButton: false, offset: [0, -20] });
    burstMarker.on('mouseover', function () { this.openPopup(); });
    burstMarker.on('mouseout', function () { this.closePopup(); });
}


setInterval(() => {
    const el = document.getElementById('infoBox');
    if (el) {
        let utc = new Date().toISOString().replace('T', ' ').slice(0, 19);
        el.innerHTML = `<div>UTC: ${utc}</div>`;
    }
}, 1000);

function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("show");
}

function copySondeId() {
    const id = document.getElementById("g1_id").innerText;
    if (!id) return;
    const url = window.location.origin + "/?sonde_id=" + encodeURIComponent(id);
    navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById("copyToast");
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 1500);
    });
}

updatePath();
setInterval(updatePath, 10000);

// PWA service worker (installability; passthrough fetch — brought from production)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/tracker/sw.js')
    .then(() => console.log("SW registered"));
}
</script>

</body>
</html>
