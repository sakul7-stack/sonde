{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/static/tracker/pballon.png" type="image/png">
<title>KML - Sonde</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.133.1/Cesium.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.133.1/Widgets/widgets.css">
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background: #fff;
        color: #000;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    #nav {
        border-bottom: 1px solid #000;
        padding: 10px 0;
        flex-shrink: 0;
        background: #fff;
        z-index: 10;
    }

    .navbar {
        max-width: 900px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 10px;
    }

    .logo {
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
        color: #000;
    }

    .links a {
        text-decoration: none;
        color: #000;
        margin-left: 15px;
        font-size: 14px;
    }

    .links a:hover {
        text-decoration: underline;
    }

    .links a.active {
        font-weight: bold;
        text-decoration: underline;
    }

    #toolbar-strip {
        border-bottom: 1px solid #000;
        padding: 8px 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
        background: #fff;
    }

    .toolbar-label {
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
    }

    .file-label {
        display: inline-block;
        border: 1px solid #000;
        padding: 4px 10px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
    }

    .file-label:hover {
        background: #000;
        color: #fff;
    }

    #kmlFile {
        display: none;
    }

    #file-name {
        font-size: 12px;
        color: #555;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    #status-msg {
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid transparent;
    }

    #status-msg.success {
        border-color: #000;
        background: #000;
        color: #fff;
    }

    #status-msg.error {
        border-color: #000;
        color: #000;
    }

    .btn {
        border: 1px solid #000;
        background: #fff;
        color: #000;
        padding: 4px 10px;
        font-size: 13px;
        cursor: pointer;
        font-family: Arial, sans-serif;
        white-space: nowrap;
    }

    .btn:hover {
        background: #000;
        color: #fff;
    }


    #page-body {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        background: #fff;
        padding: 20px 10px;
    }

    #viewer-box {
        max-width: 900px;
        width: 100%;
        border: 1px solid #000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }


    #cesiumContainer {
        flex: 1;
        min-height: 0;
        width: 100%;
    }


    #info-panel {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(255,255,255,0.95);
        border: 1px solid #000;
        padding: 10px 14px;
        font-size: 12px;
        z-index: 100;
        min-width: 180px;
        display: none;
    }

    #info-panel h3 {
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 6px;
        border-bottom: 1px solid #000;
        padding-bottom: 4px;
    }

    #info-panel .info-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 4px;
    }

    #info-panel .info-key {
        color: #555;
    }

    /* FOOTER */
    footer {
        border-top: 1px solid #000;
        text-align: center;
        padding: 6px 15px;
        font-size: 11px;
        flex-shrink: 0;
        background: #fff;
        z-index: 10;
    }

    .cesium-credit-container {
        opacity: 0.5;
    }
</style>
</head>
<body>

<div id="nav">
    <nav class="navbar">
        <a class="logo" href="/">Sonde</a>
        <div class="links">
            <a href="/history">History</a>
            <a href="/api-doc">API</a>
            <a href="/3d">KML</a>
            <a href="/accounts/dash">Dashboard</a>
            <a href="/burst">Burst</a>
            <a href="/predict">Predict</a>
            <a href="/report/submit">Report </a>
            <a href="/faq">About</a>
            <a href="https://github.com">GitHub</a>
        </div>
    </nav>
</div>

<div id="page-body">
    <div id="viewer-box">
    
        <div id="toolbar-strip">
            <span class="toolbar-label">KML Viewer</span>

            <label class="file-label" for="kmlFile">+ Load KML / KMZ</label>
            <input type="file" id="kmlFile" accept=".kml,.kmz">

            <span id="file-name">No file loaded</span>

            <button class="btn" id="clearBtn" style="display:none;">Clear</button>
            <button class="btn" id="flyBtn" style="display:none;">Fly to Data</button>

            <span id="status-msg"></span>
        </div>

        <!-- CESIUM MAP -->
        <div id="cesiumContainer"></div>

        <!-- INFO PANEL -->
        <div id="info-panel">
            <h3>Layer Info</h3>
            <div class="info-row"><span class="info-key">File:</span><span id="info-file">—</span></div>
            <div class="info-row"><span class="info-key">Entities:</span><span id="info-entities">—</span></div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    Sonde Nepal © 2026 &nbsp;|&nbsp; KML Viewer
</footer>

<script>
Cesium.Ion.defaultAccessToken = '';

const viewer = new Cesium.Viewer('cesiumContainer', {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    animation: false,
    timeline: false,
    baseLayerPicker: false,
    fullscreenButton: false,
    homeButton: false,
    infoBox: true,
    sceneModePicker: true,
    navigationHelpButton: false,
    geocoder: false,
});

viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(85.3240, 27.7172, 1500000)
});

let currentDataSource = null;

const fileInput   = document.getElementById('kmlFile');
const fileNameEl  = document.getElementById('file-name');
const statusEl    = document.getElementById('status-msg');
const clearBtn    = document.getElementById('clearBtn');
const flyBtn      = document.getElementById('flyBtn');
const infoPanel   = document.getElementById('info-panel');
const infoFile    = document.getElementById('info-file');
const infoEntities = document.getElementById('info-entities');

function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status-msg ' + (type || '');
}

fileInput.addEventListener('change', async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Clear old
    if (currentDataSource) {
        viewer.dataSources.remove(currentDataSource, true);
        currentDataSource = null;
    }

    fileNameEl.textContent = file.name;
    setStatus('Loading…', '');
    infoPanel.style.display = 'none';
    clearBtn.style.display = 'none';
    flyBtn.style.display = 'none';

    try {
        const dataSource = await Cesium.KmlDataSource.load(file, {
            camera: viewer.scene.camera,
            canvas: viewer.scene.canvas,
            clampToGround: false
        });
        viewer.dataSources.add(dataSource);
        currentDataSource = dataSource;
        await viewer.flyTo(dataSource);

        const count = dataSource.entities.values.length;
        setStatus('Loaded ✓', 'success');
        clearBtn.style.display = 'inline-block';
        flyBtn.style.display = 'inline-block';

        // Info panel
        infoFile.textContent = file.name;
        infoEntities.textContent = count;
        infoPanel.style.display = 'block';

    } catch (err) {
        console.error(err);
        setStatus('Failed to load file', 'error');
        fileNameEl.textContent = 'No file loaded';
    }

    fileInput.value = '';
});

clearBtn.addEventListener('click', function() {
    if (currentDataSource) {
        viewer.dataSources.remove(currentDataSource, true);
        currentDataSource = null;
    }
    fileNameEl.textContent = 'No file loaded';
    setStatus('', '');
    clearBtn.style.display = 'none';
    flyBtn.style.display = 'none';
    infoPanel.style.display = 'none';

    viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(85.3240, 27.7172, 40000)
    });
});

flyBtn.addEventListener('click', function() {
    if (currentDataSource) {
        viewer.flyTo(currentDataSource);
    }
});
</script>
</body>
</html>
