<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff;
}

.box {
    width: 360px;
    margin: 100px auto;
    border: 1px solid #000;
    padding: 20px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #000;
}

button {
    width: 100%;
    padding: 10px;
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
}

a {
    color: #000;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Sign Up</button>
    </form>

    <p style="text-align:center; font-size:12px;">
        Already have account? <a href="/accounts/login/">Login</a>
    </p>
</div>

</body>
</html>
