<!DOCTYPE html>
<html>
<head>
<title>Logout</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff;
}

.box {
    width: 360px;
    margin: 100px auto;
    border: 1px solid #000;
    padding: 20px;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Logout</h2>

    <p>Are you sure you want to logout?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

    <p><a href="/">Go Home</a></p>
</div>

</body>
</html>
